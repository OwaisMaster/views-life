name: CI

on:
  push:
    branches:
      - main
      - develop
      - dev
  pull_request:

jobs:
  frontend:
    name: Frontend - install, lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
      env:
        RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend - restore, build, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend and test dependencies
        run: dotnet restore ViewsLife.sln

      - name: Build solution
        run: dotnet build ViewsLife.sln --configuration Release --no-restore

      - name: Run automated tests
        run: dotnet test ViewsLife.sln --configuration Release --no-build --verbosity normal