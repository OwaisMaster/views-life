services:
  postgres:
    image: postgres:17
    container_name: viewslife-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: viewslife
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - viewslife_postgres_data:/var/lib/postgresql/data

volumes:
  viewslife_postgres_data: